<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨ タイピングリズム - TYPING RHYTHM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0f0f1a;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden
}
#gameContainer{
  position:relative;width:800px;height:600px;
  image-rendering:pixelated;
  border:4px solid #e94560;
  box-shadow:0 0 60px rgba(233,69,96,0.2),inset 0 0 30px rgba(233,69,96,0.05);
  background:#16213e
}
canvas{display:block;width:800px;height:600px;image-rendering:pixelated}
#start-screen,#game-over-screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(15,15,26,0.88);pointer-events:all;cursor:pointer;z-index:10
}
#game-over-screen{display:none}
.title{
  font-size:26px;color:#e94560;
  text-shadow:3px 3px 0 #0f3460,0 0 30px rgba(233,69,96,0.4);
  margin-bottom:16px;animation:pulse 1.5s infinite;text-align:center;line-height:1.7
}
.subtitle{
  font-size:11px;color:#e94560;margin-bottom:30px;opacity:0.7;letter-spacing:4px
}
.press-start{
  font-size:13px;color:#fff;animation:blink 1s infinite;margin-top:30px
}
.game-over-title{
  font-size:30px;color:#e94560;text-shadow:3px 3px 0 #0f3460;margin-bottom:24px
}
.final-score{font-size:18px;color:#fff;margin-bottom:8px}
.final-stats{font-size:9px;color:#aaa;margin-bottom:30px;line-height:2.2;text-align:center}
.restart-text{font-size:11px;color:#e94560;animation:blink 1s infinite}
.credit{font-size:7px;color:rgba(255,255,255,0.3);margin-top:20px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gc" width="800" height="600"></canvas>

<div id="start-screen">
  <div class="title">⌨ タイピング<br>リズム</div>
  <div class="subtitle">★ TYPING RHYTHM ★</div>
  <div class="press-start">▶ PRESS ENTER ◀</div>
  <div class="credit" style="margin-top:40px">キーボードでタイプしてね！</div>
  <div class="credit">Type the falling letters!</div>
</div>

<div id="game-over-screen">
  <div class="game-over-title">GAME OVER</div>
  <div class="final-score" id="finalScore">SCORE: 0</div>
  <div class="final-stats" id="finalStats">
    MAX COMBO: 0<br>
    ACCURACY: 0%<br>
    NOTES HIT: 0 / 0
  </div>
  <div class="restart-text">▶ PRESS ENTER TO RETRY ◀</div>
</div>
</div>

<script>
// ============================================================
//  TYPING RHYTHM - タイピングリズム
//  Retro Pixel Typing Rhythm Game
//  Sound: Chiptune / Web Audio API
// ============================================================

const c = document.getElementById('gc');
const ctx = c.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W=800,H=600;

// ---- AUDIO ENGINE (Chiptune) ----
let actx=null, mg=null, aInit=false;
function initAudio(){
  if(aInit)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  mg=actx.createGain();mg.gain.value=0.35;mg.connect(actx.destination);
  aInit=true;
}

function note(freq,dur,type='square',vol=0.12){
  if(!aInit)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(mg);o.start();o.stop(actx.currentTime+dur);
}

function noise(dur,vol=0.08){
  if(!aInit)return;
  const n=actx.sampleRate*dur,b=actx.createBuffer(1,n,actx.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,3);
  const s=actx.createBufferSource();s.buffer=b;
  const g=actx.createGain();g.gain.value=vol;
  s.connect(g);g.connect(mg);s.start();
}

function sfxHit(combo=0){
  if(!aInit)return;
  const b=523.25+Math.min(combo,30)*4;
  note(b,0.08,'square',0.1);
  setTimeout(()=>note(b*1.5,0.06,'square',0.07),25);
  setTimeout(()=>note(b*2,0.05,'square',0.05),50);
  noise(0.04,0.06);
}

function sfxPerfect(){
  if(!aInit)return;
  [659.25,783.99,1046.5].forEach((f,i)=>setTimeout(()=>note(f,0.12,'square',0.08),i*50));
  noise(0.06,0.05);
}

function sfxMiss(){
  if(!aInit)return;
  note(130.81,0.25,'sawtooth',0.06);
  setTimeout(()=>note(98,0.35,'sawtooth',0.04),80);
}

function sfxCombo(cb){
  if(!aInit)return;
  const f=440*Math.pow(1.122,(cb%12));
  note(f,0.08,'square',0.08);
  setTimeout(()=>note(f*1.25,0.08,'square',0.06),40);
  setTimeout(()=>note(f*1.5,0.1,'square',0.05),80);
}

function sfxStart(){
  if(!aInit)return;
  [262,330,392,523].forEach((f,i)=>setTimeout(()=>note(f,0.15,'square',0.07),i*80));
}

// ---- BGM ----
const MELODY = [
  262,294,330,349,392,440,494,523,
  494,440,392,349,330,294,262,330,
  392,440,523,587,659,784,659,587,
  523,494,440,392,330,262,294,330
];
const BASS = [131,165,196,131,165,196,131,165];
let bgmTimer=null,bgmOn=false,bi=0,bbi=0,bbc=0;

function playBGM(){
  if(!aInit||bgmOn)return;
  bgmOn=true;bi=0;bbi=0;bbc=0;
  function step(){
    if(!bgmOn)return;
    note(MELODY[bi%MELODY.length],0.18,'square',0.03);
    if(bbc%4===0){note(BASS[bbi%BASS.length],0.35,'sawtooth',0.02);bbi++;}
    if(bbc%4===2)noise(0.02,0.02);
    bi++;bbc++;
    bgmTimer=setTimeout(step,380+Math.sin(bbc*0.2)*12);
  }
  step();
}

function stopBGM(){bgmOn=false;if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}}

// ---- GAME STATE ----
const G = {
  state:'start',score:0,combo:0,maxCombo:0,
  hit:0,miss:0,notesHit:0,notesMissed:0,total:0,
  frame:0,speed:0.55,particles:[],judges:[],shake:0,
  bgFlash:0
};

const JUDGE_Y=530;
const PERFECT=35,GOOD=65,MISS=95;

// ---- NOTE CLASS ----
class Note{
  constructor(ch,time,lane){
    this.ch=ch.toUpperCase();
    this.t=time;
    this.ln=lane;
    this.alive=true;this.judged=false;
    this.x=0;this.y=-80;
  }
  getY(f){
    const p=(f-this.t)/60*G.speed;
    return -80+(p+0.5)*(JUDGE_Y+80)*1.5;
  }
  getX(){const lw=160;return 80+this.ln*lw+lw/2;}
  getDist(f){return Math.abs(this.getY(f)-JUDGE_Y);}
  getJudge(f){
    const d=this.getDist(f);
    if(d<=PERFECT)return'perfect';
    if(d<=GOOD)return'good';
    if(d<=MISS)return'miss';
    return null;
  }
}

// ---- SONGS ----
function genSong(){
  const seq="ASDFJKL;ASDFJKL;GHGHGHJKLJKL;QWERTZUIOPASDFGHJKLYXCVBNM";
  const n=[];
  let t=90;
  for(let i=0;i<seq.length;i++){
    n.push(new Note(seq[i],t,i%4));
    t+=60+Math.floor(Math.random()*20);
  }
  // Add more notes for longer play
  const extra="ASDFJKL;QWERTZUIOPYXCVBNMGHJKL;ASDF";
  for(let i=0;i<extra.length;i++){
    const ch=extra[i];
    n.push(new Note(ch,t,i%4));
    t+=55+Math.floor(Math.random()*22);
  }
  return n;
}

// ---- PARTICLES ----
class Particle{
  constructor(x,y,clr){
    this.x=x;this.y=y;
    this.vx=(Math.random()-0.5)*10;
    this.vy=(Math.random()-0.5)*10-4;
    this.life=1;this.decay=0.015+Math.random()*0.025;
    this.clr=clr;this.sz=2+Math.random()*3;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;this.vy+=0.15;
    this.life-=this.decay;this.sz*=0.97;
  }
  draw(c){
    if(this.life<=0)return;
    c.globalAlpha=this.life;
    c.fillStyle=this.clr;
    const s=Math.round(this.sz);
    c.fillRect(Math.round(this.x-s/2),Math.round(this.y-s/2),s,s);
    c.globalAlpha=1;
  }
}

// ---- GAME FUNCTIONS ----
let notes=[],judgeTexts=[];
let comboMiles=[5,10,15,20,30,50,100];

function spawnJT(txt,clr,x){
  judgeTexts.push({t:txt,c:clr,x:x,y:JUDGE_Y-20,life:1,vy:-2.5});
}

function initGame(){
  notes=genSong();G.frame=0;G.score=0;G.combo=0;G.maxCombo=0;
  G.notesHit=0;G.notesMissed=0;G.hit=0;G.miss=0;
  G.particles=[];G.shake=0;G.bgFlash=0;G.total=notes.length;
  judgeTexts=[];comboMiles=[5,10,15,20,30,50,100];
}

function acceptHit(nt,jdg){
  nt.judged=true;nt.alive=false;G.hit++;
  let pts=0,jt='',clr='';
  switch(jdg){
    case'perfect':pts=150+G.combo*8;jt='パーフェクト!!';clr='#ffff00';sfxPerfect();break;
    case'good':pts=70+G.combo*4;jt='GOOD!';clr='#00ff88';sfxHit(G.combo);break;
    default:pts=10;jt='MISS';clr='#ff8844';sfxMiss();G.combo=0;
  }
  if(jdg!=='miss'){
    G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    if(comboMiles.includes(G.combo))sfxCombo(G.combo);
  }
  G.score+=Math.floor(pts);G.notesHit++;
  spawnJT(jt,clr,nt.x);
  for(let i=0;i<14;i++)G.particles.push(new Particle(nt.x,JUDGE_Y,clr));
  if(jdg==='perfect'){G.shake=3;G.bgFlash=8;}
  else if(jdg==='good')G.bgFlash=4;
}

function handleKey(key){
  if(G.state!=='playing')return;
  const uk=key.toUpperCase();
  if(uk.length!==1||!/[A-Za-z;',.\/]/.test(key))return;
  let best=null,bestD=Infinity;
  for(const n of notes){
    if(n.judged||!n.alive)continue;
    const d=n.getDist(G.frame);
    if(n.ch===uk&&d<MISS&&d<bestD){best=n;bestD=d;}
  }
  if(best){
    const jdg=best.getJudge(G.frame);
    acceptHit(best,jdg||'miss');
  }else{
    G.miss++;sfxMiss();G.shake=4;G.combo=0;G.bgFlash=3;
    spawnJT('×', '#ff4444', 400);
  }
}

function checkMissed(){
  for(const n of notes){
    if(n.judged||!n.alive)continue;
    if(n.getY(G.frame)>JUDGE_Y+160){
      n.judged=true;n.alive=false;G.miss++;G.combo=0;G.notesMissed++;
    }
  }
}

// ---- DRAWING ----
function drawBG(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Lanes
  for(let i=0;i<4;i++){
    const x=80+i*160;
    ctx.fillStyle=i%2?'rgba(233,69,96,0.02)':'rgba(255,255,255,0.02)';
    ctx.fillRect(x,0,160,H);
  }
  ctx.strokeStyle='rgba(233,69,96,0.12)';ctx.lineWidth=2;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(80+i*160,0);ctx.lineTo(80+i*160,H);ctx.stroke();}
  // Background flash
  if(G.bgFlash>0){
    ctx.fillStyle=`rgba(255,255,255,${G.bgFlash*0.006})`;
    ctx.fillRect(0,0,W,H);G.bgFlash--;
  }
}

function drawLaneLabels(){
  const lbs=['A','S','D','F'];
  for(let i=0;i<4;i++){
    ctx.font='11px "Press Start 2P"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(233,69,96,0.25)';
    ctx.fillText(lbs[i],80+i*160+80,40);
  }
}

function drawHitZone(){
  ctx.fillStyle='rgba(255,255,0,0.06)';ctx.fillRect(60,JUDGE_Y-PERFECT,680,PERFECT*2);
  ctx.fillStyle='rgba(0,255,136,0.04)';ctx.fillRect(60,JUDGE_Y-GOOD,680,GOOD*2);
  // Line
  ctx.strokeStyle='#e94560';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(60,JUDGE_Y);ctx.lineTo(740,JUDGE_Y);ctx.stroke();
  // Glow
  const gr=ctx.createLinearGradient(0,JUDGE_Y-12,0,JUDGE_Y+12);
  gr.addColorStop(0,'rgba(233,69,96,0)');
  gr.addColorStop(0.5,'rgba(233,69,96,0.25)');
  gr.addColorStop(1,'rgba(233,69,96,0)');
  ctx.fillStyle=gr;ctx.fillRect(60,JUDGE_Y-12,680,24);
  // Markers
  ctx.fillStyle='#e94560';
  ctx.fillRect(55,JUDGE_Y-4,8,8);ctx.fillRect(737,JUDGE_Y-4,8,8);
  // Zone labels
  ctx.font='6px "Press Start 2P"';
  ctx.textAlign='left';ctx.fillStyle='rgba(255,255,0,0.3)';
  ctx.fillText('PERFECT',65,JUDGE_Y-PERFECT-8);
  ctx.fillStyle='rgba(0,255,136,0.2)';
  ctx.fillText('GOOD',65,JUDGE_Y-GOOD-8);
}

function drawNote(nt){
  if(!nt.alive||nt.judged)return;
  const y=nt.getY(G.frame);
  if(y<-100||y>H+100)return;
  const x=nt.getX();
  const sz=52,hf=sz/2;
  // Glow
  ctx.fillStyle='rgba(233,69,96,0.1)';
  ctx.fillRect(Math.round(x-hf-6),Math.round(y-hf-6),sz+12,sz+12);
  // Body - pixel block
  ctx.fillStyle='#e94560';
  ctx.fillRect(Math.round(x-hf),Math.round(y-hf),sz,sz);
  // Border
  ctx.strokeStyle='#ff6b81';ctx.lineWidth=3;
  ctx.strokeRect(Math.round(x-hf),Math.round(y-hf),sz,sz);
  // Inner pixel pattern
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(Math.round(x-hf+8),Math.round(y-hf+8),sz-16,6);
  ctx.fillRect(Math.round(x-hf+8),Math.round(y-hf+sz-14),sz-16,6);
  // Letter
  ctx.fillStyle='#fff';
  ctx.font='bold 28px "Press Start 2P"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(nt.ch,Math.round(x),Math.round(y));
  // Trail
  for(let i=1;i<=6;i++){
    const ty=y-i*14;if(ty<-30)break;
    ctx.globalAlpha=0.05-i*0.007;
    ctx.fillStyle='#e94560';
    ctx.fillRect(Math.round(x-hf*0.65),Math.round(ty-hf*0.65),sz*0.65,sz*0.65);
  }
  ctx.globalAlpha=1;
}

function drawNotes(){notes.forEach(nt=>drawNote(nt));}

function drawParticles(){
  G.particles=G.particles.filter(p=>p.life>0);
  G.particles.forEach(p=>{p.update();p.draw(ctx);});
}

function drawJudges(){
  judgeTexts=judgeTexts.filter(j=>j.life>0);
  judgeTexts.forEach(j=>{
    ctx.globalAlpha=j.life;
    ctx.font='12px "Press Start 2P"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=j.c;
    ctx.shadowColor=j.c;ctx.shadowBlur=12;
    ctx.fillText(j.t,Math.round(j.x),Math.round(j.y));
    ctx.shadowBlur=0;
    j.y+=j.vy;j.life-=0.018;
    ctx.globalAlpha=1;
  });
}

function drawHUD(){
  ctx.textBaseline='top';
  // Score
  ctx.font='14px "Press Start 2P"';
  ctx.textAlign='left';ctx.fillStyle='#aaa';
  ctx.fillText('SCORE',16,16);
  ctx.font='22px "Press Start 2P"';
  ctx.fillStyle='#fff';
  ctx.fillText(String(G.score).padStart(8,'0'),16,36);
  // Combo
  if(G.combo>1){
    ctx.textAlign='right';
    ctx.font='12px "Press Start 2P"';
    ctx.fillStyle='#ffdd00';ctx.fillText('COMBO',W-16,16);
    ctx.font='26px "Press Start 2P"';
    ctx.fillText(String(G.combo),W-16,36);
    // Combo fire effect
    const f=Math.sin(Date.now()/100)*0.3+0.7;
    ctx.fillStyle=`rgba(255,200,0,${f*0.08})`;
    ctx.fillRect(W-200,0,200,80);
  }
  // Stats
  ctx.textAlign='left';ctx.font='8px "Press Start 2P"';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  const rem=notes.filter(n=>n.alive&&!n.judged).length;
  ctx.fillText(`REM:${rem}`,16,68);
  // Song title
  ctx.textAlign='center';ctx.font='7px "Press Start 2P"';
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillText('★ タイピングリズム ★',W/2,12);
  // BPM indicator
  const beat=(Math.sin(G.frame*0.1)*0.5+0.5)*0.3;
  ctx.fillStyle=`rgba(233,69,96,${beat})`;
  ctx.fillRect(W/2-1,20,2,10);
}

function drawScanLine(){
  ctx.fillStyle='rgba(255,255,255,0.015)';
  const sy=(G.frame*3)%H;
  ctx.fillRect(0,sy,W,2);
}

// ---- GAME LOOP ----
let lastT=0;
function loop(ts){
  const dt=ts-lastT;lastT=ts;
  ctx.clearRect(0,0,W,H);
  
  let sx=0,sy=0;
  if(G.shake>0){sx=(Math.random()-0.5)*G.shake;sy=(Math.random()-0.5)*G.shake;G.shake*=0.9;if(G.shake<0.5)G.shake=0;}
  ctx.save();
  ctx.translate(Math.round(sx),Math.round(sy));
  
  drawBG();
  
  if(G.state==='start'){
    drawLaneLabels();drawHitZone();
    // Floating demo notes
    const t=Date.now()/500;
    ['A','S','D','F'].forEach((ch,i)=>{
      const nn=new Note(ch,0,i);
      nn.y=JUDGE_Y-120+Math.sin(t+i*1.5)*50;
      nn.x=nn.getX();nn.alive=true;
      drawNote(nn);
    });
    ctx.restore();
    requestAnimationFrame(loop);
    return;
  }
  
  if(G.state==='playing'){
    G.frame++;
    checkMissed();
    
    const alive=notes.filter(n=>n.alive&&!n.judged);
    const allDone=notes.every(n=>n.judged);
    if(allDone||(alive.length===0&&G.frame>200)){
      G.state='gameover';stopBGM();
      const to=G.notesHit+G.notesMissed;
      const acc=to>0?Math.round((G.notesHit/to)*100):0;
      document.getElementById('finalScore').textContent=`SCORE: ${G.score}`;
      document.getElementById('finalStats').innerHTML=
        `MAX COMBO: ${G.maxCombo}<br>ACCURACY: ${acc}%<br>NOTES HIT: ${G.notesHit} / ${to}`;
      document.getElementById('game-over-screen').style.display='flex';
    }
    
    drawLaneLabels();drawHitZone();
    drawNotes();drawParticles();drawJudges();
    drawHUD();drawScanLine();
  }
  
  if(G.state==='gameover'){
    drawHitZone();drawParticles();drawHUD();
  }
  
  ctx.restore();
  requestAnimationFrame(loop);
}

// ---- EVENTS ----
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k))e.preventDefault();
  
  if(G.state==='start'&&k==='Enter'){
    initAudio();sfxStart();
    document.getElementById('start-screen').style.display='none';
    G.state='playing';initGame();
    setTimeout(playBGM,300);
    return;
  }
  
  if(G.state==='gameover'&&k==='Enter'){
    document.getElementById('game-over-screen').style.display='none';
    G.state='playing';initGame();playBGM();
    return;
  }
  
  if(G.state==='playing'&&k.length===1){e.preventDefault();handleKey(k);}
});

document.getElementById('start-screen').addEventListener('click',()=>{
  if(G.state!=='start')return;
  initAudio();sfxStart();
  document.getElementById('start-screen').style.display='none';
  G.state='playing';initGame();
  setTimeout(playBGM,300);
});

// ---- START ----
requestAnimationFrame(loop);
console.log('=== タイピングリズム ===');
console.log('Press ENTER to start!');
</script>
</body>
</html>
