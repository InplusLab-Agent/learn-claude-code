<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国象棋</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #2c1810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
}
.game-container {
    background: #e8c882;
    padding: 30px 40px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    border: 4px solid #b8860b;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 20px;
}
.header h1 {
    font-size: 28px;
    color: #5c2e00;
    text-shadow: 1px 1px 0 #d4a54a;
}
.turn-indicator {
    font-size: 22px;
    font-weight: bold;
    padding: 6px 24px;
    border-radius: 8px;
    background: #d4a54a;
    color: #5c2e00;
    border: 2px solid #b8860b;
    transition: all 0.3s ease;
}
.turn-indicator.red-turn { background: #c0392b; color: #fff; }
.turn-indicator.black-turn { background: #1a1a2e; color: #fff; }
canvas {
    display: block;
    margin: 0 auto;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: inset 0 0 0 2px #b8860b;
}
.status-bar {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
}
#statusMsg {
    font-size: 18px;
    color: #5c2e00;
    font-weight: bold;
    min-height: 28px;
}
#restartBtn {
    padding: 8px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #8b4513;
    color: #f5deb3;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}
#restartBtn:hover { background: #a0522d; transform: scale(1.03); }

/* 音效开关按钮 */
.sound-toggle {
    padding: 8px 14px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    background: #d4a54a;
    color: #5c2e00;
    cursor: pointer;
    transition: 0.2s;
    line-height: 1;
}
.sound-toggle:hover { background: #c4953a; transform: scale(1.05); }
.sound-toggle.muted { background: #a08060; color: #666; opacity: 0.6; }

/* 模式切换按钮 */
.mode-toggle {
    padding: 6px 16px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    background: #5c2e00;
    color: #f5deb3;
    cursor: pointer;
    transition: 0.2s;
    line-height: 1.4;
    white-space: nowrap;
}
.mode-toggle:hover { background: #7a3f0a; transform: scale(1.03); }
.mode-toggle.ai-mode { background: #1a6b3c; color: #fff; }

.info { text-align: center; margin-top: 10px; font-size: 14px; color: #7a5230; }

/* 吃子列表区域 */
.captured-area {
    margin-top: 10px;
    padding: 8px 12px 4px;
    border-top: 2px solid #b8860b;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    min-height: 50px;
}
.captured-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.captured-side label {
    font-size: 13px;
    font-weight: bold;
    color: #5c2e00;
    letter-spacing: 1px;
}
.captured-side label .badge {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.badge-red { background: #cc0000; border: 1px solid #8b0000; }
.badge-black { background: #1a1a2e; border: 1px solid #000; }
.captured-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    min-height: 32px;
    align-items: center;
}
.captured-piece {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: bold;
    font-family: "KaiTi", "STKaiti", "SimSun", serif;
    border: 1.5px solid #5c2e00;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.2);
    transition: transform 0.15s;
}
.captured-piece:hover { transform: scale(1.2); }
.captured-piece.p-red { color: #cc0000; background: #fdf0e0; }
.captured-piece.p-black { color: #111; background: #e8e0d0; }
.captured-empty {
    color: #a08060;
    font-size: 13px;
    font-style: italic;
}

/* 简易闪烁动画用于将杀提示 */
@keyframes pulseText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
#statusMsg.check { animation: pulseText 0.6s ease-in-out infinite; color:#c0392b; }
</style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1>🏯 象棋</h1>
        <div style="display:flex;align-items:center;gap:10px;">
            <button id="modeToggleBtn" class="mode-toggle">🤖 人机</button>
            <div class="turn-indicator red-turn" id="turnIndicator">红方走棋</div>
        </div>
    </div>
    <canvas id="boardCanvas" width="580" height="640"></canvas>
    <div class="status-bar">
        <span id="statusMsg"></span>
        <button id="restartBtn">重新开始</button>
        <button id="soundToggleBtn" class="sound-toggle" title="切换音效">🔊</button>
    </div>
    <div class="captured-area" id="capturedArea">
        <div class="captured-side">
            <label><span class="badge badge-red"></span>红方吃子</label>
            <div class="captured-pieces" id="redCapturedPieces">
                <span class="captured-empty">暂无</span>
            </div>
        </div>
        <div class="captured-side" style="text-align:right;">
            <label>黑方吃子 <span class="badge badge-black"></span></label>
            <div class="captured-pieces" id="blackCapturedPieces" style="justify-content:flex-end;">
                <span class="captured-empty">暂无</span>
            </div>
        </div>
    </div>
    <div class="info" id="infoText">红方先行 · 点击选中棋子再点击目标位置</div>
</div>

<script>
// ============================================================
//  中国象棋 - 双人对战 (单机版)  ✦ 选中特效优化版 ✦
// ============================================================

const canvas = document.getElementById('boardCanvas');
const ctx = canvas.getContext('2d');
const turnEl = document.getElementById('turnIndicator');
const statusEl = document.getElementById('statusMsg');

// ---------- 尺寸常量 ----------
const COLS = 9, ROWS = 10;
const CELL = 58;
const PADDING_X = 38;
const PADDING_Y = 48;
const PIECE_RADIUS = 23;

// ---------- 动画变量 ----------
let animFrame = 0;         // 递增帧计数器
let animationId = null;    // requestAnimationFrame ID

// ---------- 棋局状态 ----------
let board = [];
let currentTurn = 'red';
let selected = null;       // { row, col }
let validMoves = [];       // 当前选中棋子的合法走法 [{ row, col }]
let gameOver = false;
let moveHistory = [];
let redCaptured = [];   // 红方吃掉的子(黑方棋子)
let blackCaptured = []; // 黑方吃掉的子(红方棋子)

// ---------- 棋子定义 ----------
function createPiece(type, color) { return { type, color }; }

function getPieceChar(piece) {
    if (!piece) return '';
    const redMap = { '帅':'帥','仕':'仕','相':'相','马':'馬','车':'車','炮':'炮','兵':'兵' };
    const blackMap = { '将':'將','士':'士','象':'象','马':'马','车':'车','砲':'砲','卒':'卒' };
    if (piece.color === 'red') return redMap[piece.type] || piece.type;
    return blackMap[piece.type] || piece.type;
}

// ---------- 初始化棋盘 ----------
function initBoard() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    const redBack = ['车','马','相','仕','帅','仕','相','马','车'];
    for (let c = 0; c < 9; c++) board[9][c] = createPiece(redBack[c], 'red');
    board[7][1] = createPiece('炮', 'red');
    board[7][7] = createPiece('炮', 'red');
    for (let c = 0; c < 9; c += 2) board[6][c] = createPiece('兵', 'red');

    const blackBack = ['车','马','象','士','将','士','象','马','车'];
    for (let c = 0; c < 9; c++) board[0][c] = createPiece(blackBack[c], 'black');
    board[2][1] = createPiece('砲', 'black');
    board[2][7] = createPiece('砲', 'black');
    for (let c = 0; c < 9; c += 2) board[3][c] = createPiece('卒', 'black');
}

// ---------- 坐标转换 ----------
function toPixel(row, col) {
    return { x: PADDING_X + col * CELL, y: PADDING_Y + row * CELL };
}

function toRowCol(px, py) {
    const col = Math.round((px - PADDING_X) / CELL);
    const row = Math.round((py - PADDING_Y) / CELL);
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return null;
    const p = toPixel(row, col);
    const dist = Math.hypot(px - p.x, py - p.y);
    if (dist > CELL * 0.45) return null;
    return { row, col };
}

// ============================================================
//  ✦ 新增：计算合法走法 ✦
// ============================================================
function computeValidMoves(row, col) {
    const piece = board[row][col];
    if (!piece) return [];
    const moves = [];
    for (let tr = 0; tr < ROWS; tr++) {
        for (let tc = 0; tc < COLS; tc++) {
            if (isValidMove(row, col, tr, tc)) {
                if (isMoveSafe(row, col, tr, tc, piece.color)) {
                    moves.push({ row: tr, col: tc });
                }
            }
        }
    }
    return moves;
}

// ============================================================
//  ✦ 增强绘制：选中特效 ✦
// ============================================================
function drawSelectionEffect() {
    if (!selected || gameOver) return;

    const p = toPixel(selected.row, selected.col);
    const time = animFrame * 0.05;
    const pulse = 0.5 + 0.5 * Math.sin(time);

    // ---- 1. 外层大光晕 (径向渐变) ----
    const glowRadius = PIECE_RADIUS + 16 + pulse * 8;
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowRadius);
    glow.addColorStop(0, 'rgba(255, 215, 0, 0.35)');
    glow.addColorStop(0.5, 'rgba(255, 215, 0, 0.15)');
    glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // ---- 2. 脉动光环 (外圈) ----
    const ringRadius = PIECE_RADIUS + 6 + pulse * 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, ringRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + 0.4 * (1 - pulse)})`;
    ctx.lineWidth = 2.5 + pulse * 1.5;
    ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
    ctx.shadowBlur = 12;
    ctx.stroke();

    // ---- 3. 内圈强光 ----
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PIECE_RADIUS + 3, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 255, 200, ${0.2 + 0.3 * pulse})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // ---- 4. 四个角的小星星装饰 ----
    ctx.shadowBlur = 0;
    const starDist = PIECE_RADIUS + 10;
    for (let i = 0; i < 4; i++) {
        const angle = i * Math.PI / 2 + time * 0.3;
        const sx = p.x + Math.cos(angle) * starDist;
        const sy = p.y + Math.sin(angle) * starDist;
        const size = 2 + pulse * 2;
        ctx.fillStyle = `rgba(255, 255, 200, ${0.4 + 0.4 * (1 - pulse)})`;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
    }

    // ---- 5. 合法走位指示点 ----
    ctx.shadowBlur = 0;
    for (const move of validMoves) {
        const mp = toPixel(move.row, move.col);
        const targetPiece = board[move.row][move.col];

        if (targetPiece) {
            // 可吃子位置：红色闪烁圆环
            const eatPulse = 0.6 + 0.4 * Math.sin(time + move.row + move.col);
            ctx.beginPath();
            ctx.arc(mp.x, mp.y, PIECE_RADIUS + 4, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 50, 50, ${0.3 + 0.5 * eatPulse})`;
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 吃子位置四个小三角
            for (let i = 0; i < 4; i++) {
                const a = i * Math.PI / 2 + Math.PI / 4;
                const dx = Math.cos(a) * (PIECE_RADIUS + 2);
                const dy = Math.sin(a) * (PIECE_RADIUS + 2);
                ctx.fillStyle = `rgba(255, 80, 80, ${0.5 + 0.3 * eatPulse})`;
                ctx.beginPath();
                ctx.arc(mp.x + dx, mp.y + dy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        } else {
            // 空位：绿色半透明圆点 (带呼吸效果)
            const dotPulse = 0.5 + 0.4 * Math.sin(time * 1.5 + move.row * 2 + move.col * 3);
            ctx.beginPath();
            ctx.arc(mp.x, mp.y, 7, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(50, 200, 80, ${0.2 + 0.4 * dotPulse})`;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(mp.x, mp.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(50, 200, 80, ${0.4 + 0.5 * dotPulse})`;
            ctx.fill();

            // 外围细圈
            ctx.beginPath();
            ctx.arc(mp.x, mp.y, 10, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(50, 200, 80, ${0.15 + 0.2 * dotPulse})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }
}

// ============================================================
//  ✦ AI 落子提示绘制（蓝色系高亮，与玩家选中区分） ✦
// ============================================================
function drawAISuggestion() {
    if (!aiSuggestion || gameOver) return;

    const { fromR, fromC, toR, toC } = aiSuggestion;
    const fromP = toPixel(fromR, fromC);
    const toP = toPixel(toR, toC);
    const time = animFrame * 0.05;
    const pulse = 0.5 + 0.5 * Math.sin(time);

    // ---- 1. 起点：蓝色脉动光晕 ----
    const glowRadius = PIECE_RADIUS + 14 + pulse * 6;
    const glow = ctx.createRadialGradient(fromP.x, fromP.y, 0, fromP.x, fromP.y, glowRadius);
    glow.addColorStop(0, 'rgba(30, 144, 255, 0.35)');
    glow.addColorStop(0.5, 'rgba(30, 144, 255, 0.15)');
    glow.addColorStop(1, 'rgba(30, 144, 255, 0)');
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(fromP.x, fromP.y, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // ---- 2. 起点：蓝色光环 ----
    ctx.beginPath();
    ctx.arc(fromP.x, fromP.y, PIECE_RADIUS + 5 + pulse * 3, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(30, 144, 255, ${0.4 + 0.3 * (1 - pulse)})`;
    ctx.lineWidth = 2.5 + pulse * 1.5;
    ctx.shadowColor = 'rgba(30, 144, 255, 0.5)';
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ---- 3. 终点：蓝色目标十字 + 脉动圆 ----
    // 外圈
    ctx.beginPath();
    ctx.arc(toP.x, toP.y, PIECE_RADIUS + 6, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(30, 144, 255, ${0.4 + 0.3 * pulse})`;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 内圈
    ctx.beginPath();
    ctx.arc(toP.x, toP.y, 8 + pulse * 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(30, 144, 255, ${0.2 + 0.2 * pulse})`;
    ctx.fill();

    // 中心点
    ctx.beginPath();
    ctx.arc(toP.x, toP.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(30, 144, 255, ${0.5 + 0.3 * pulse})`;
    ctx.fill();

    // ---- 4. 箭头连线：从起点到终点 ----
    const angle = Math.atan2(toP.y - fromP.y, toP.x - fromP.x);
    const startR = PIECE_RADIUS + 8;
    const endR = PIECE_RADIUS + 8;
    const sx = fromP.x + Math.cos(angle) * startR;
    const sy = fromP.y + Math.sin(angle) * startR;
    const ex = toP.x - Math.cos(angle) * endR;
    const ey = toP.y - Math.sin(angle) * endR;

    // 虚线
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(30, 144, 255, ${0.3 + 0.2 * pulse})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // 箭头头
    const arrowSize = 10;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(
        ex - arrowSize * Math.cos(angle - 0.4),
        ey - arrowSize * Math.sin(angle - 0.4)
    );
    ctx.lineTo(
        ex - arrowSize * Math.cos(angle + 0.4),
        ey - arrowSize * Math.sin(angle + 0.4)
    );
    ctx.closePath();
    ctx.fillStyle = `rgba(30, 144, 255, ${0.5 + 0.3 * pulse})`;
    ctx.fill();

    // ---- 5. 文字提示 "AI →" ----
    ctx.font = 'bold 14px "Microsoft YaHei", "KaiTi", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = `rgba(30, 144, 255, ${0.7 + 0.3 * pulse})`;
    ctx.fillText('🤖', toP.x, toP.y - PIECE_RADIUS - 10);
}

// ============================================================
//  ✦ 增强棋子绘制：选中时浮起效果 ✦
// ============================================================
function drawPiece(row, col, piece) {
    const p = toPixel(row, col);
    const isRed = piece.color === 'red';
    const isSelected = selected && selected.row === row && selected.col === col;

    // 选中时阴影更大更柔和（浮起感）
    const shadowSize = isSelected ? 14 : 6;
    const shadowOffset = isSelected ? 4 : 2;

    ctx.shadowColor = isSelected ? 'rgba(255, 215, 0, 0.5)' : 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = shadowSize;
    ctx.shadowOffsetX = shadowOffset;
    ctx.shadowOffsetY = shadowOffset;

    // 外圆 - 选中时颜色更亮
    const grad = ctx.createRadialGradient(
        p.x - (isSelected ? 6 : 4), 
        p.y - (isSelected ? 6 : 4), 
        2, 
        p.x, p.y, 
        PIECE_RADIUS
    );
    if (isRed) {
        grad.addColorStop(0, isSelected ? '#fff8ee' : '#fff5e6');
        grad.addColorStop(0.7, isSelected ? '#f5e4ba' : '#f5deb3');
        grad.addColorStop(1, isSelected ? '#e8c040' : '#d4a54a');
    } else {
        grad.addColorStop(0, isSelected ? '#f0e8d8' : '#e8e0d0');
        grad.addColorStop(0.7, isSelected ? '#e0d0b8' : '#d5c8b0');
        grad.addColorStop(1, isSelected ? '#c8b898' : '#b8a88a');
    }
    ctx.shadowBlur = shadowSize;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PIECE_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // 边框 (选中时加亮)
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.strokeStyle = isSelected 
        ? (isRed ? '#ff4500' : '#444') 
        : (isRed ? '#8b0000' : '#1a1a1a');
    ctx.lineWidth = isSelected ? 2.5 : 2;
    ctx.stroke();

    // 内圈 (选中时带光晕)
    ctx.beginPath();
    ctx.arc(p.x, p.y, PIECE_RADIUS - 4, 0, Math.PI * 2);
    ctx.strokeStyle = isSelected 
        ? (isRed ? '#ff6633' : '#666') 
        : (isRed ? '#cc3333' : '#333');
    ctx.lineWidth = isSelected ? 1.5 : 1.2;
    ctx.stroke();

    // 选中时额外描一层发光内圈
    if (isSelected) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, PIECE_RADIUS - 2, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + 0.3 * Math.sin(animFrame * 0.05)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // 文字
    const char = getPieceChar(piece);
    ctx.font = `bold ${PIECE_RADIUS * 1.1}px "KaiTi", "STKaiti", "SimSun", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = isRed ? '#cc0000' : '#111';
    ctx.shadowBlur = 0;
    ctx.fillText(char, p.x, p.y + 1);
}

// ---------- 棋盘绘制 (原逻辑) ----------
function drawBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景
    ctx.fillStyle = '#e8c882';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 画网格线
    ctx.strokeStyle = '#5c2e00';
    ctx.lineWidth = 1.5;

    for (let r = 0; r < ROWS; r++) {
        const y = PADDING_Y + r * CELL;
        ctx.beginPath();
        ctx.moveTo(PADDING_X, y);
        ctx.lineTo(PADDING_X + 8 * CELL, y);
        ctx.stroke();
    }

    for (let c = 0; c < COLS; c++) {
        const x = PADDING_X + c * CELL;
        ctx.beginPath();
        ctx.moveTo(x, PADDING_Y);
        ctx.lineTo(x, PADDING_Y + 4 * CELL);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, PADDING_Y + 5 * CELL);
        ctx.lineTo(x, PADDING_Y + 9 * CELL);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.moveTo(PADDING_X, PADDING_Y + 4 * CELL);
    ctx.lineTo(PADDING_X, PADDING_Y + 5 * CELL);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(PADDING_X + 8 * CELL, PADDING_Y + 4 * CELL);
    ctx.lineTo(PADDING_X + 8 * CELL, PADDING_Y + 5 * CELL);
    ctx.stroke();

    drawPalace(0, 3);
    drawPalace(7, 9);

    // 河界文字
    ctx.font = 'bold 22px "KaiTi", "STKaiti", serif';
    ctx.fillStyle = '#5c2e00';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const riverY = PADDING_Y + 4.5 * CELL;
    ctx.fillText('楚  河', PADDING_X + 2 * CELL, riverY);
    ctx.fillText('汉  界', PADDING_X + 6 * CELL, riverY);

    // 星位标记
    const starPositions = [
        [2,1], [2,7], [7,1], [7,7],
        [3,0], [3,2], [3,4], [3,6], [3,8],
        [6,0], [6,2], [6,4], [6,6], [6,8]
    ];
    for (const [r,c] of starPositions) drawStar(r, c);

    // ✦ 先绘制选中特效（在棋子下方） ✦
    drawSelectionEffect();

    // ✦ 再绘制 AI 落子提示 ✦
    drawAISuggestion();

    // 画棋子
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const piece = board[r][c];
            if (piece) drawPiece(r, c, piece);
        }
    }
}

function drawPalace(r1, r2) {
    ctx.strokeStyle = '#5c2e00';
    ctx.lineWidth = 1.5;
    const c1 = 3, c2 = 5;
    const p1 = toPixel(r1, c1);
    const p2 = toPixel(r2, c2);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
    const p3 = toPixel(r1, c2);
    const p4 = toPixel(r2, c1);
    ctx.beginPath();
    ctx.moveTo(p3.x, p3.y);
    ctx.lineTo(p4.x, p4.y);
    ctx.stroke();
}

function drawStar(row, col) {
    const p = toPixel(row, col);
    const d = 5, g = 3;
    ctx.strokeStyle = '#5c2e00';
    ctx.lineWidth = 1.2;
    const dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
    for (const [dr,dc] of dirs) {
        ctx.beginPath();
        ctx.moveTo(p.x + dr * (d+g), p.y + dc * d);
        ctx.lineTo(p.x + dr * d, p.y + dc * d);
        ctx.lineTo(p.x + dr * d, p.y + dc * (d+g));
        ctx.stroke();
    }
}

// ---------- 动画循环 (新增) ----------
function startAnimation() {
    if (animationId) return;
    function loop() {
        animFrame++;
        drawBoard();
        animationId = requestAnimationFrame(loop);
    }
    animationId = requestAnimationFrame(loop);
}

function stopAnimation() {
    if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
    }
}

// ---------- 走法规则 (保持不变) ----------
function isValidMove(fromR, fromC, toR, toC) {
    const piece = board[fromR][fromC];
    if (!piece) return false;
    const target = board[toR][toC];
    if (target && target.color === piece.color) return false;

    const dr = toR - fromR;
    const dc = toC - fromC;
    const adr = Math.abs(dr);
    const adc = Math.abs(dc);

    switch (piece.type) {
        case '帅': case '将': return isValidGeneralMove(piece, fromR, fromC, toR, toC, dr, dc, adr, adc);
        case '仕': case '士': return isValidAdvisorMove(piece, fromR, fromC, toR, toC, dr, dc, adr, adc);
        case '相': case '象': return isValidElephantMove(piece, fromR, fromC, toR, toC, dr, dc, adr, adc);
        case '马': return isValidHorseMove(fromR, fromC, toR, toC, dr, dc, adr, adc);
        case '车': return isValidChariotMove(fromR, fromC, toR, toC, dr, dc);
        case '炮': case '砲': return isValidCannonMove(fromR, fromC, toR, toC, dr, dc);
        case '兵': case '卒': return isValidSoldierMove(piece, fromR, fromC, toR, toC, dr, dc, adr, adc);
        default: return false;
    }
}

function isValidGeneralMove(piece, fr, fc, tr, tc, dr, dc, adr, adc) {
    if (adr + adc !== 1) return false;
    if (tc < 3 || tc > 5) return false;
    if (piece.color === 'red' && (tr < 7 || tr > 9)) return false;
    if (piece.color === 'black' && (tr < 0 || tr > 2)) return false;
    if (fc === tc) {
        let minR = Math.min(fr, tr);
        let maxR = Math.max(fr, tr);
        for (let r = minR + 1; r < maxR; r++) {
            if (board[r][fc]) return true;
        }
        const other = board[tr][tc];
        if (other && (other.type === '将' || other.type === '帅')) return false;
    }
    return true;
}

function isValidAdvisorMove(piece, fr, fc, tr, tc, dr, dc, adr, adc) {
    if (adr !== 1 || adc !== 1) return false;
    if (tc < 3 || tc > 5) return false;
    if (piece.color === 'red' && (tr < 7 || tr > 9)) return false;
    if (piece.color === 'black' && (tr < 0 || tr > 2)) return false;
    return true;
}

function isValidElephantMove(piece, fr, fc, tr, tc, dr, dc, adr, adc) {
    if (adr !== 2 || adc !== 2) return false;
    const eyeR = fr + dr / 2;
    const eyeC = fc + dc / 2;
    if (board[eyeR][eyeC]) return false;
    if (piece.color === 'red' && tr < 5) return false;
    if (piece.color === 'black' && tr > 4) return false;
    return true;
}

function isValidHorseMove(fr, fc, tr, tc, dr, dc, adr, adc) {
    if (!((adr === 2 && adc === 1) || (adr === 1 && adc === 2))) return false;
    if (adr === 2) {
        const legR = fr + (dr > 0 ? 1 : -1);
        if (board[legR][fc]) return false;
    } else {
        const legC = fc + (dc > 0 ? 1 : -1);
        if (board[fr][legC]) return false;
    }
    return true;
}

function isValidChariotMove(fr, fc, tr, tc, dr, dc) {
    if (dr !== 0 && dc !== 0) return false;
    if (dr === 0 && dc === 0) return false;
    if (dr === 0) {
        const minC = Math.min(fc, tc);
        const maxC = Math.max(fc, tc);
        for (let c = minC + 1; c < maxC; c++) {
            if (board[fr][c]) return false;
        }
    } else {
        const minR = Math.min(fr, tr);
        const maxR = Math.max(fr, tr);
        for (let r = minR + 1; r < maxR; r++) {
            if (board[r][fc]) return false;
        }
    }
    return true;
}

function isValidCannonMove(fr, fc, tr, tc, dr, dc) {
    if (dr !== 0 && dc !== 0) return false;
    if (dr === 0 && dc === 0) return false;

    let countBetween = 0;
    if (dr === 0) {
        const minC = Math.min(fc, tc);
        const maxC = Math.max(fc, tc);
        for (let c = minC + 1; c < maxC; c++) {
            if (board[fr][c]) countBetween++;
        }
    } else {
        const minR = Math.min(fr, tr);
        const maxR = Math.max(fr, tr);
        for (let r = minR + 1; r < maxR; r++) {
            if (board[r][fc]) countBetween++;
        }
    }

    const target = board[tr][tc];
    if (target) return countBetween === 1;
    else return countBetween === 0;
}

function isValidSoldierMove(piece, fr, fc, tr, tc, dr, dc, adr, adc) {
    const forward = piece.color === 'red' ? -1 : 1;
    if (piece.color === 'red' && fr <= 4) {
        if (adr + adc !== 1) return false;
        if (dr === 0 && (dc === 1 || dc === -1)) return true;
        if (dc === 0 && dr === forward) return true;
        return false;
    } else if (piece.color === 'red') {
        if (dc !== 0) return false;
        return dr === forward;
    } else if (piece.color === 'black' && fr >= 5) {
        if (adr + adc !== 1) return false;
        if (dr === 0 && (dc === 1 || dc === -1)) return true;
        if (dc === 0 && dr === forward) return true;
        return false;
    } else {
        if (dc !== 0) return false;
        return dr === forward;
    }
}

// ---------- 将军检测 ----------
function findGeneral(color) {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const p = board[r][c];
            if (p && p.color === color && (p.type === '帅' || p.type === '将')) {
                return { row: r, col: c };
            }
        }
    }
    return null;
}

function isUnderAttack(color) {
    const gen = findGeneral(color);
    if (!gen) return false;
    const enemyColor = color === 'red' ? 'black' : 'red';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const p = board[r][c];
            if (p && p.color === enemyColor) {
                if (isValidMove(r, c, gen.row, gen.col)) return true;
            }
        }
    }
    const otherGen = findGeneral(enemyColor);
    if (otherGen && otherGen.col === gen.col) {
        let blocked = false;
        const minR = Math.min(gen.row, otherGen.row);
        const maxR = Math.max(gen.row, otherGen.row);
        for (let r = minR + 1; r < maxR; r++) {
            if (board[r][gen.col]) { blocked = true; break; }
        }
        if (!blocked) return true;
    }
    return false;
}

function simulateMove(fr, fc, tr, tc) {
    const captured = board[tr][tc];
    const moved = board[fr][fc];
    board[tr][tc] = moved;
    board[fr][fc] = null;
    return captured;
}

function undoMove(fr, fc, tr, tc, captured) {
    board[fr][fc] = board[tr][tc];
    board[tr][tc] = captured;
}

function isMoveSafe(fr, fc, tr, tc, color) {
    const captured = simulateMove(fr, fc, tr, tc);
    const safe = !isUnderAttack(color);
    undoMove(fr, fc, tr, tc, captured);
    return safe;
}

// ---------- 检查将杀或困毙 ----------
function hasLegalMoves(color) {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const p = board[r][c];
            if (p && p.color === color) {
                for (let tr = 0; tr < ROWS; tr++) {
                    for (let tc = 0; tc < COLS; tc++) {
                        if (isValidMove(r, c, tr, tc)) {
                            if (isMoveSafe(r, c, tr, tc, color)) return true;
                        }
                    }
                }
            }
        }
    }
    return false;
}

// ---------- 游戏流程 ----------
function handleClick(row, col) {
    if (gameOver) return;

    // 人机模式下，AI 回合禁止点击
    if (isAIMode && currentTurn === aiColor) {
        statusEl.textContent = '🤖 AI 思考中，请稍候...';
        return;
    }
    if (isAIThinking) return;

    const piece = board[row][col];

    // 点击自己的棋子 → 选中并计算合法走法
    if (piece && piece.color === currentTurn) {
        // 如果已经选中该棋子，点击取消选中
        if (selected && selected.row === row && selected.col === col) {
            selected = null;
            validMoves = [];
            statusEl.textContent = '';
            drawBoard();
            return;
        }
        selected = { row, col };
        validMoves = computeValidMoves(row, col);
        statusEl.textContent = `已选中 ${getPieceChar(piece)}`;
        // 启动动画循环（确保动效运行）
        startAnimation();
        SoundManager.select();   // 🔊 选中音效
        return;
    }

    // 有选中棋子时尝试移动
    if (selected) {
        const fr = selected.row, fc = selected.col;
        const movingPiece = board[fr][fc];

        // 点击相同位置取消选中
        if (row === fr && col === fc) {
            selected = null;
            validMoves = [];
            statusEl.textContent = '';
            return;
        }

        // 点击己方另一棋子 → 切换选中
        if (piece && piece.color === currentTurn) {
            selected = { row, col };
            validMoves = computeValidMoves(row, col);
            statusEl.textContent = `已选中 ${getPieceChar(piece)}`;
            SoundManager.select();   // 🔊 切换选中音效
            return;
        }

        // 校验走法
        if (!isValidMove(fr, fc, row, col)) {
            statusEl.textContent = '❌ 不合法的走法！';
            SoundManager.invalid();   // 🔊 非法走法音效
            drawBoard();
            return;
        }
        if (!isMoveSafe(fr, fc, row, col, currentTurn)) {
            statusEl.textContent = '❌ 走棋后己方将被将军！';
            SoundManager.invalid();   // 🔊 非法走法音效
            drawBoard();
            return;
        }

        // 执行走棋
        const captured = board[row][col];
        board[row][col] = movingPiece;
        board[fr][fc] = null;
        moveHistory.push({ fromR: fr, fromC: fc, toR: row, toC: col, captured });

        // 🔊 播放移动或吃子音效
        if (captured) {
            if (currentTurn === 'red') redCaptured.push(captured);
            else blackCaptured.push(captured);
            SoundManager.capture();
            updateCapturedDisplay();   // 更新吃子列表
        } else {
            SoundManager.move();
        }

        selected = null;
        validMoves = [];

        // 切换回合
        const enemy = currentTurn === 'red' ? 'black' : 'red';
        currentTurn = enemy;
        updateTurnDisplay();

        // 检查对方状态
        if (isUnderAttack(enemy)) {
            if (hasLegalMoves(enemy)) {
                statusEl.textContent = `⚡ 将军！`;
                statusEl.className = 'check';
                SoundManager.check();   // 🔊 将军音效
            } else {
                statusEl.textContent = `🏆 ${currentTurn === 'red' ? '黑' : '红'}方获胜！将杀！`;
                statusEl.className = '';
                gameOver = true;
                stopAnimation();
                SoundManager.win();     // 🔊 获胜音效
            }
        } else {
            if (!hasLegalMoves(enemy)) {
                statusEl.textContent = `🏆 ${currentTurn === 'red' ? '黑' : '红'}方获胜！困毙！`;
                statusEl.className = '';
                gameOver = true;
                stopAnimation();
                SoundManager.win();     // 🔊 获胜音效
            } else {
                statusEl.textContent = '';
                statusEl.className = '';
            }
        }

        drawBoard();

        // 人机模式：玩家走完后，自动触发 AI 走棋
        if (!gameOver && isAIMode && currentTurn === aiColor) {
            aiMakeMove();
        }
    }
}

// ---------- 吃子列表显示 ----------
function updateCapturedDisplay() {
    const redContainer = document.getElementById('redCapturedPieces');
    const blackContainer = document.getElementById('blackCapturedPieces');

    function renderPieces(container, pieces, color) {
        container.innerHTML = '';
        if (pieces.length === 0) {
            const empty = document.createElement('span');
            empty.className = 'captured-empty';
            empty.textContent = '暂无';
            container.appendChild(empty);
            return;
        }
        // 按类型分组并计数
        const countMap = {};
        for (const p of pieces) {
            const key = p.type;
            countMap[key] = (countMap[key] || 0) + 1;
        }
        // 用固定顺序排列：将/帅 > 士/仕 > 象/相 > 马 > 车 > 炮/砲 > 卒/兵
        const order = ['将','帅','士','仕','象','相','马','车','炮','砲','卒','兵'];
        const sortedTypes = Object.keys(countMap).sort((a, b) => {
            const ia = order.indexOf(a);
            const ib = order.indexOf(b);
            return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        });
        for (const type of sortedTypes) {
            const count = countMap[type];
            const piece = pieces.find(p => p.type === type);
            const span = document.createElement('span');
            span.className = `captured-piece p-${color}`;
            span.textContent = getPieceChar(piece);
            span.title = `${type} × ${count}`;
            container.appendChild(span);
            if (count > 1) {
                const countLabel = document.createElement('span');
                countLabel.style.cssText = 'font-size:12px;color:#5c2e00;font-weight:bold;margin-left:-2px;';
                countLabel.textContent = `×${count}`;
                container.appendChild(countLabel);
            }
        }
    }

    renderPieces(redContainer, redCaptured, 'black');   // 红方吃的是黑子
    renderPieces(blackContainer, blackCaptured, 'red');  // 黑方吃的是红子
}

// ---------- UI辅助 ----------
function updateTurnDisplay() {
    if (gameOver) return;
    if (isAIMode) {
        if (currentTurn === 'red') {

        } else {

                turnEl.className = 'turn-indicator black-turn';
            } else {
                turnEl.textContent = '⚫ 你（黑方）走棋';
                turnEl.className = 'turn-indicator black-turn';
            }
        }
    } else {
        if (currentTurn === 'red') {

        } else {

}

function restartGame() {
    initBoard();
    currentTurn = 'red';
    selected = null;
    validMoves = [];
    gameOver = false;
    moveHistory = [];
    redCaptured = [];
    blackCaptured = [];
    isAIThinking = false;
    aiSuggestion = null;
    updateTurnDisplay();
    // 人机模式下显示对应信息
    if (isAIMode) {

        statusEl.textContent = `人机模式 · 你执${playerColor}方 · 红方先行`;

    // 人机模式：如果 AI 先手（AI 执红）
    if (isAIMode && currentTurn === aiColor) {
        setTimeout(() => aiMakeMove(), 300);
    }
}

/** 获取某颜色的所有合法走法 */
function getAllMoves(color) {
    const moves = [];
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const p = board[r][c];
            if (p && p.color === color) {
                for (let tr = 0; tr < ROWS; tr++) {
                    for (let tc = 0; tc < COLS; tc++) {
                        if (isValidMove(r, c, tr, tc)) {
                            if (isMoveSafe(r, c, tr, tc, color)) {
                                moves.push({ fromR: r, fromC: c, toR: tr, toC: tc });
                            }
                        }
                    }
                }
            }
        }
    }
    return moves;
}

    [12, 14, 14, 16, 16, 16, 14, 14, 12],
    [12, 14, 14, 16, 16, 16, 14, 14, 12],
    [10, 12, 12, 14, 14, 14, 12, 12, 10],
    [10, 12, 12, 14, 14, 14, 12, 12, 10],
    [ 8, 10, 10, 12, 12, 12, 10, 10,  8],
    [ 8, 10, 10, 12, 12, 12, 10, 10,  8],
    [ 6,  8,  8, 10, 10, 10,  8,  8,  6],
    [ 6,  8,  8, 10, 10, 10,  8,  8,  6],
    [ 4,  6,  6,  8,  8,  8,  6,  6,  4],
    [ 4,  6,  6,  8,  8,  8,  6,  6,  4]
];

// 炮的位置价值
const CANNON_POS_TABLE = [
    [6,  8,  8, 10, 12, 10,  8,  8,  6],
    [6,  8,  8, 10, 12, 10,  8,  8,  6],
    [4,  6,  6,  8, 10,  8,  6,  6,  4],
    [4,  6,  6,  8, 10,  8,  6,  6,  4],
    [4,  6,  6,  8,  8,  8,  6,  6,  4],
    [4,  6,  6,  8,  8,  8,  6,  6,  4],
    [2,  4,  4,  6,  6,  6,  4,  4,  2],
    [2,  4,  4,  6,  6,  6,  4,  4,  2],
    [2,  4,  4,  4,  4,  4,  4,  4,  2],
    [2,  4,  4,  4,  4,  4,  4,  4,  2]
];

function getPieceValue(piece, row, col) {
    if (!piece) return 0;
    const baseVal = PIECE_VALUES[piece.type] || 0;

    let posVal = 0;
    const r = piece.color === 'red' ? (9 - row) : row; // 统一转为黑方视角

    switch (piece.type) {
        case '兵': case '卒':
            posVal = SOLDIER_POS_TABLE[r][col];
            // 过河兵价值提升
            if ((piece.color === 'red' && row <= 4) || (piece.color === 'black' && row >= 5)) {
                posVal += 20;
            }
            break;
        case '马':
            posVal = HORSE_POS_TABLE[r][col];
            break;
        case '车':
            posVal = CHARIOT_POS_TABLE[r][col];
            break;
        case '炮': case '砲':
            posVal = CANNON_POS_TABLE[r][col];
            break;
    }

    return baseVal + posVal;
}

/** 评估整个棋盘，正值对红方有利，负值对黑方有利 */
function evaluateBoard() {
    let score = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const p = board[r][c];
            if (p) {
                const val = getPieceValue(p, r, c);
                score += (p.color === 'red' ? val : -val);
            }
        }
    }
    return score;
}

// ============================================================
//  Minimax + Alpha-Beta 剪枝
// ============================================================

function minimax(depth, alpha, beta, isMaximizing, aiColorParam) {
    // 达到搜索深度，返回评估值
    if (depth === 0) {
        return { score: evaluateBoard() };
    }

    const color = isMaximizing ? 'red' : 'black';
    const moves = getAllMoves(color);

    // 无走法 = 将杀或困毙
    if (moves.length === 0) {
        // 被将杀的一方输，返回极值
        return {
            score: isMaximizing ? -99999 + (3 - depth) : 99999 - (3 - depth)
        };
    }

    // 走法排序：吃子走法优先（提高剪枝效率）
    moves.sort((a, b) => {
        const targetA = board[a.toR][a.toC];
        const targetB = board[b.toR][b.toC];
        const valA = targetA ? (PIECE_VALUES[targetA.type] || 0) : 0;
        const valB = targetB ? (PIECE_VALUES[targetB.type] || 0) : 0;
        return valB - valA; // 吃价值大的子优先
    });

    let bestMove = null;

    if (isMaximizing) {
        let maxScore = -Infinity;
        for (const move of moves) {
            // 模拟走棋
            const captured = simulateMove(move.fromR, move.fromC, move.toR, move.toC);

            const result = minimax(depth - 1, alpha, beta, false, aiColorParam);

            // 撤销走棋
            undoMove(move.fromR, move.fromC, move.toR, move.toC, captured);

            if (result.score > maxScore) {
                maxScore = result.score;
                bestMove = move;
            }
            alpha = Math.max(alpha, maxScore);
            if (beta <= alpha) break; // Beta 剪枝
        }
        return { score: maxScore, move: bestMove };
    } else {
        let minScore = Infinity;
        for (const move of moves) {
            const captured = simulateMove(move.fromR, move.fromC, move.toR, move.toC);

            const result = minimax(depth - 1, alpha, beta, true, aiColorParam);

            undoMove(move.fromR, move.fromC, move.toR, move.toC, captured);

            if (result.score < minScore) {
                minScore = result.score;
                bestMove = move;
            }
            beta = Math.min(beta, minScore);
            if (beta <= alpha) break; // Alpha 剪枝
        }
        return { score: minScore, move: bestMove };
    }
}

/** AI 选择最佳走法 */
function findBestMove(aiColor) {
    const isMaximizing = aiColor === 'red';
    const result = minimax(3, -Infinity, Infinity, isMaximizing, aiColor);
    return result.move;
}

/** 执行 AI 走棋 */
function aiMakeMove() {
    if (gameOver || isAIThinking) return;
    if (!isAIMode) return;
    if (currentTurn !== aiColor) return;

    isAIThinking = true;
    statusEl.textContent = '🤔 AI 思考中...';
    aiSuggestion = null;

    // 先让界面更新，然后计算最佳走法
    setTimeout(() => {
        const move = findBestMove(aiColor);

        if (!move) {
            isAIThinking = false;
            // AI 无走法，判负
            if (!hasLegalMoves(aiColor)) {
                const winner = aiColor === 'red' ? '黑' : '红';
                statusEl.textContent = `🏆 ${winner}方获胜！AI 无子可走！`;
                statusEl.className = '';
                gameOver = true;
                stopAnimation();
                SoundManager.win();
            }
            return;
        }

        // 显示 AI 落子提示
        aiSuggestion = move;
        const pieceChar = getPieceChar(board[move.fromR][move.fromC]);
        statusEl.textContent = `🤖 AI 落子提示：${pieceChar} →`;
        drawBoard();

        // 模拟思考间隔 0.3~0.8 秒（随机），让玩家看到提示
        const thinkDelay = 300 + Math.random() * 500;

        setTimeout(() => {
            aiSuggestion = null; // 清除提示

            // 执行 AI 走棋
            const { fromR, fromC, toR, toC } = move;
            const captured = board[toR][toC];
            board[toR][toC] = board[fromR][fromC];
            board[fromR][fromC] = null;
            moveHistory.push({ fromR, fromC, toR, toC, captured });

            if (captured) {
                if (aiColor === 'red') redCaptured.push(captured);
                else blackCaptured.push(captured);
                SoundManager.capture();
                updateCapturedDisplay();
            } else {
                SoundManager.move();
            }

            selected = null;
            validMoves = [];

            // 切换回合
            const enemy = currentTurn === 'red' ? 'black' : 'red';
            currentTurn = enemy;
            updateTurnDisplay();

            // 检查对方状态
            if (isUnderAttack(enemy)) {
                if (hasLegalMoves(enemy)) {
                    statusEl.textContent = `⚡ 将军！`;
                    statusEl.className = 'check';
                    SoundManager.check();
                } else {
                    statusEl.textContent = `🏆 ${currentTurn === 'red' ? '黑' : '红'}方获胜！将杀！`;
                    statusEl.className = '';
                    gameOver = true;
                    stopAnimation();
                    SoundManager.win();
                }
            } else {
                if (!hasLegalMoves(enemy)) {
                    statusEl.textContent = `🏆 ${currentTurn === 'red' ? '黑' : '红'}方获胜！困毙！`;
                    statusEl.className = '';
                    gameOver = true;
                    stopAnimation();
                    SoundManager.win();
                } else {
                    statusEl.textContent = '';
                    statusEl.className = '';
                }
            }

            isAIThinking = false;
            drawBoard();

            // 如果切换后又是 AI 回合（玩家执黑，AI 执红的情况），继续走棋
            if (!gameOver && isAIMode && currentTurn === aiColor) {
                aiMakeMove();
            }
        }, thinkDelay);
    }, 50);
}

/** 切换对战模式 */
function toggleGameMode() {
    isAIMode = !isAIMode;
    const btn = document.getElementById('modeToggleBtn');
    const infoText = document.getElementById('infoText');
    if (isAIMode) {
        btn.textContent = '👥 双人';
        btn.classList.add('ai-mode');
        aiColor = 'black';
        infoText.textContent = '🤖 人机模式 · 你执红方 · 点击选中再点击目标';
        document.title = '中国象棋 - 人机对战';
    } else {
        btn.textContent = '🤖 人机';
        btn.classList.remove('ai-mode');
        infoText.textContent = '红方先行 · 点击选中棋子再点击目标位置';
        document.title = '中国象棋 - 双人对战';
    }
    restartGame();
}

// ============================================================
//  ✦ 音效系统 - 使用 Web Audio API 合成音效 ✦
// ============================================================
const SoundManager = {
    _ctx: null,
    _muted: false,

    /** 懒加载 AudioContext（需用户交互后才能创建） */
    _ensureCtx() {
        if (!this._ctx) {
            const Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return null;
            this._ctx = new Ctor();
        }
        // 浏览器自动暂停策略：如果有用户手势则恢复
        if (this._ctx.state === 'suspended') {
            this._ctx.resume();
        }
        return this._ctx;
    },

    /** 主音量 */
    get _masterGain() { return 0.35; },

    /** 切换静音 */
    toggle() {
        this._muted = !this._muted;
        return this._muted;
    },

    /** 是否静音 */
    isMuted() { return this._muted; },

    /** 播放一个简单的频率包络 */
    _playTone(freq, duration, type='sine', vol=1, ramp='linear') {
        const ctx = this._ensureCtx();
        if (!ctx || this._muted) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol * this._masterGain, ctx.currentTime);
        if (ramp === 'exp') {
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        } else {
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
        }
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
    },

    /** 播放频率序列 */
    _playSequence(notes, baseTime) {
        const ctx = this._ensureCtx();
        if (!ctx || this._muted) return;
        const now = ctx.currentTime;
        for (const { freq, time, dur, type, vol } of notes) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, now + time);
            gain.gain.setValueAtTime((vol || 1) * this._masterGain, now + time);
            gain.gain.linearRampToValueAtTime(0, now + time + dur);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + time);
            osc.stop(now + time + dur);
        }
    },

    // ===== 以下为各种游戏音效 =====

    /** 🎵 选中棋子 - 短促上升音 */
    select() {
        this._playTone(520, 0.12, 'sine', 0.7);
        setTimeout(() => this._playTone(680, 0.10, 'sine', 0.5), 50);
    },

    /** 🎵 移动棋子 - 柔和木质感 */
    move() {
        this._playTone(300, 0.08, 'triangle', 0.6);
    },

    /** 🎵 吃子 - 有力冲击 */
    capture() {
        const ctx = this._ensureCtx();
        if (!ctx || this._muted) return;
        const now = ctx.currentTime;

        // 重击低频
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'square';
        osc1.frequency.setValueAtTime(150, now);
        osc1.frequency.exponentialRampToValueAtTime(60, now + 0.15);
        gain1.gain.setValueAtTime(0.3 * this._masterGain, now);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.2);

        // 清脆叮声
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(880, now + 0.05);
        gain2.gain.setValueAtTime(0.4 * this._masterGain, now + 0.05);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.05);
        osc2.stop(now + 0.25);
    },

    /** 🎵 将军 - 警报音 */
    check() {
        const ctx = this._ensureCtx();
        if (!ctx || this._muted) return;
        const now = ctx.currentTime;
        for (let i = 0; i < 3; i++) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(660 + i * 80, now + i * 0.15);
            gain.gain.setValueAtTime(0.2 * this._masterGain, now + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.12);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + i * 0.15);
            osc.stop(now + i * 0.15 + 0.12);
        }
    },

    /** 🎵 将杀 / 获胜 - 胜利号角 */
    win() {
        this._playSequence([
            { freq: 523, time: 0.00, dur: 0.20, type: 'sine', vol: 0.8 },
            { freq: 659, time: 0.15, dur: 0.20, type: 'sine', vol: 0.7 },
            { freq: 784, time: 0.30, dur: 0.20, type: 'sine', vol: 0.7 },
            { freq: 1047, time: 0.45, dur: 0.40, type: 'sine', vol: 0.9 },
            { freq: 784, time: 0.90, dur: 0.15, type: 'sine', vol: 0.6 },
            { freq: 1047, time: 1.05, dur: 0.50, type: 'sine', vol: 0.8 },
        ]);
    },

    /** 🎵 非法走法 - 错误提示 */
    invalid() {
        const ctx = this._ensureCtx();
        if (!ctx || this._muted) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(120, now + 0.2);
        gain.gain.setValueAtTime(0.2 * this._masterGain, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.25);
    },

    /** 🎵 开局提示 - 清脆铃声 */
    gameStart() {
        this._playSequence([
            { freq: 660, time: 0.00, dur: 0.12, type: 'sine', vol: 0.6 },
            { freq: 880, time: 0.10, dur: 0.12, type: 'sine', vol: 0.6 },
            { freq: 1100, time: 0.20, dur: 0.25, type: 'sine', vol: 0.7 },
        ]);
    },
};

// ---------- 事件绑定 ----------
canvas.addEventListener('click', (e) => {
    if (gameOver) return;
    // 人机模式下 AI 回合不响应点击
    if (isAIMode && currentTurn === aiColor) {
        statusEl.textContent = '🤖 AI 思考中，请稍候...';
        return;
    }
    if (isAIThinking) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const px = (e.clientX - rect.left) * scaleX;
    const py = (e.clientY - rect.top) * scaleY;
    const pos = toRowCol(px, py);
    if (pos) handleClick(pos.row, pos.col);
});

document.getElementById('restartBtn').addEventListener('click', restartGame);

document.getElementById('modeToggleBtn').addEventListener('click', toggleGameMode);

// ---------- 音效开关按钮 ----------
const soundToggleBtn = document.getElementById('soundToggleBtn');
soundToggleBtn.addEventListener('click', () => {
    const isMuted = SoundManager.toggle();
    soundToggleBtn.textContent = isMuted ? '🔇' : '🔊';
    soundToggleBtn.classList.toggle('muted', isMuted);
    // 播放提示音（如果开启则播放）
    if (!isMuted) {
        SoundManager.gameStart();
    }
});

// ---------- 启动 ----------
restartGame();
</script>
